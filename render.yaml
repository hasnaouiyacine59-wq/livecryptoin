services:
  - type: web
    name: livecryptoin
    env: python
    buildCommand: |
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash - &&
      apt-get install -y nodejs &&
      cd frontend && npm ci && npm run build && cd ..
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
