<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#3fb950"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Hexagon icon mark -->
  <!-- outer hex -->
  <polygon points="24,4 40,13 40,31 24,40 8,31 8,13" fill="url(#g2)" stroke="url(#g1)" stroke-width="1.5"/>
  <!-- inner crystal lines -->
  <line x1="24" y1="4"  x2="24" y2="40" stroke="url(#g1)" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="8"  y1="13" x2="40" y2="31" stroke="url(#g1)" stroke-width="0.8" stroke-opacity="0.4"/>
  <line x1="40" y1="13" x2="8"  y2="31" stroke="url(#g1)" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- center dot -->
  <circle cx="24" cy="22" r="3.5" fill="url(#g1)"/>
  <!-- pulse ring -->
  <circle cx="24" cy="22" r="6.5" stroke="url(#g1)" stroke-width="1" fill="none" stroke-opacity="0.5"/>

  <!-- Wordmark -->
  <text x="52" y="30" font-family="'Segoe UI',system-ui,sans-serif" font-size="20" font-weight="800" letter-spacing="-0.5" fill="url(#g1)">Cryptyos</text>

  <!-- Tagline -->
  <text x="53" y="41" font-family="'Segoe UI',system-ui,sans-serif" font-size="7.5" font-weight="400" letter-spacing="1.8" fill="#8b949e">DEX DATA PLATFORM</text>
</svg>
